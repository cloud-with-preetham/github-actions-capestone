name: main-pipeline

on:
  push:
    branches: [ main ]

jobs:

  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.12"
      run_tests: true

  docker-build:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: github-actions-capstone
      tag: latest

    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy
        run: echo "Deploying image ${{ needs.docker-build.outputs.image_url }}"
