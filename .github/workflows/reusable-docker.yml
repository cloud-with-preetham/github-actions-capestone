name: Reuseable Docker

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      tag:
        required: true
        type: string

    secrets:
      docker_username:
      required: true
      docker_token:
      token_required: true

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.image.outputs.url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER}}
          password: ${{ secrets.DOCKER_TOKEN}}

      - name: Build Docker Image
        run: |
          docker build -t ${{ vars.DOCKER_USERNAME }}/${{ vars.image_name }}:${{ inputs.tag }} -f docker/Dockerfile .

      - name: Push Docker Image
        run: |
          docker push ${{ vars.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}

      - name: GitHub Output
        run: echo "url=${{ vars.DOCKER_USERNAME }}/${{ inputs.image_name }}:${{ inputs.tag }}" >> GITHUB_OUTPUT
