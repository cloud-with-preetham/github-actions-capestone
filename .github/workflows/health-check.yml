name: Health Check

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Pull Docker Image
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/github-actions-capestone:latest

      - name: Run Health Check
        run: |
          chmod 764 scripts/health_check.sh
          DOCKER_USERNAME=${{ vars.DOCKER_USERNAME }} ./scripts/health_check.sh

      - name: Health Check Summary
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ vars.DOCKER_USERNAME }}/github-actions-capestone:latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY
